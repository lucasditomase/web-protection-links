name: Update Legal Date

on:
  push:
    paths:
      - 'privacy-policy.md'
      - 'terms-of-service.md'

concurrency:
  group: update-legal-date-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Last Edited Date
        run: |
          CURRENT_DATE=$(date +"%B %d, %Y")
          
          update_file() {
              local file=$1
              if [ -f "$file" ]; then
                  sed -i "s/^Last Updated: .*/Last Updated: $CURRENT_DATE/" "$file"
              fi
          }

          normalize_trailing_spaces() {
              local file=$1
              if [ -f "$file" ]; then
                  # Keep markdown line-break style consistent with format-markdown workflow.
                  awk '{ sub(/[[:space:]]*$/, ""); print $0 "  " }' "$file" > "$file.tmp"
                  mv "$file.tmp" "$file"
              fi
          }
          
          update_file "privacy-policy.md"
          update_file "terms-of-service.md"
          normalize_trailing_spaces "privacy-policy.md"
          normalize_trailing_spaces "terms-of-service.md"

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add privacy-policy.md terms-of-service.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-update last edited date [skip ci]"
            max_attempts=5
            attempt=1
            until [ "$attempt" -gt "$max_attempts" ]; do
              git pull --rebase origin "${GITHUB_REF_NAME}"
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "Push succeeded on attempt $attempt"
                break
              fi
              echo "Push race detected (attempt $attempt/$max_attempts). Retrying..."
              attempt=$((attempt + 1))
              sleep 2
            done
            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "Failed to push after $max_attempts attempts."
              exit 1
            fi
          else
            echo "No changes to commit."
          fi
